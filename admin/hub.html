<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XPTO - Admin Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.12) 0px, transparent 40%),
        radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.12) 0px, transparent 40%);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
    }

    .logo-section {
      display: flex;
      flex-direction: column;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.4);
      color: var(--danger);
    }

    /* Cards Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }

    .menu-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      text-decoration: none;
      color: var(--text-main);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 220px;
      position: relative;
      overflow: hidden;
    }

    .menu-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: transparent;
      transition: background 0.3s ease;
    }

    .card-purple::after {
      background: linear-gradient(90deg, var(--accent-purple), #a78bfa);
    }

    .card-pink::after {
      background: linear-gradient(90deg, var(--accent-pink), #f472b6);
    }

    .menu-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(139, 92, 246, 0.15);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .card-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card-description {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-action {
      font-size: 14px;
      font-weight: 500;
      color: #a78bfa;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: auto;
    }

    .card-pink .card-action {
      color: #f472b6;
    }

    .card-action svg {
      transition: transform 0.3s ease;
    }

    .menu-card:hover .card-action svg {
      transform: translateX(4px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-bar">
      <div class="logo-section">
        <div class="logo-text">XPTO</div>
        <div class="subtitle">System Administration Hub</div>
      </div>
      <a href="/admin/logout" class="logout-btn">Logout</a>
    </div>

    <div class="menu-grid">
      <!-- Link to shortener dashboard -->
      <a href="/admin/shortener" class="menu-card card-purple">
        <div>
          <div class="card-title">URL Shortener</div>
          <div class="card-description">Manage shortened links, view redirection statistics, and check access logs.</div>
        </div>
        <div class="card-action">
          Open admin-shortener
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </div>
      </a>

      <!-- Link to base58 tools -->
      <a href="/admin/base58" class="menu-card card-pink">
        <div>
          <div class="card-title">Base58 Utility</div>
          <div class="card-description">Encode and decode values to/from Base58 format.</div>
        </div>
        <div class="card-action">
          Open base58
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
