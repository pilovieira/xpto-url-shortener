<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XPTO Shortener - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: #111827;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      background-image:
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      position: relative;
    }

    /* Glowing decorative circles */
    .glow-circle {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      filter: blur(50px);
      z-index: -1;
    }

    .glow-1 {
      top: -30px;
      left: -30px;
      background: var(--accent-purple);
    }

    .glow-2 {
      bottom: -30px;
      right: -30px;
      background: var(--accent-pink);
    }

    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.25);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-pink) 100%);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-6px);
      }

      75% {
        transform: translateX(6px);
      }
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: var(--accent-purple);
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="login-card">
      <div class="header">
        <div class="logo-text">XPTO</div>
        <div class="subtitle">Admin Dashboard Authentication</div>
      </div>

      <div id="error" class="error-msg">Invalid email or password.</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="admin@xpto.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-login" id="submitBtn">Login</button>
      </form>

      <div class="back-link">
        <a href="/">← Back to Shortener</a>
      </div>
    </div>
  </div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const submitBtn = document.getElementById('submitBtn');

      errorDiv.style.display = 'none';
      submitBtn.innerText = 'Verifying...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          window.location.href = '/admin';
        } else {
          errorDiv.style.display = 'block';
          submitBtn.innerText = 'Login';
          submitBtn.disabled = false;
        }
      } catch (err) {
        errorDiv.innerText = 'Connection error. Please try again.';
        errorDiv.style.display = 'block';
        submitBtn.innerText = 'Login';
        submitBtn.disabled = false;
      }
    }
  </script>
</body>

</html>
